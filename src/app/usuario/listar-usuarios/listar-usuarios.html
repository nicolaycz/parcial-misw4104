<div class="container">
  <header class="page-header">
    <h1>Usuarios</h1>
    <p class="subtitle">{{ usuarios.length }} usuarios disponibles</p>
  </header>

  <div class="grid">
    <article
      class="card"
      *ngFor="let usuario of usuarios"
      (click)="seleccionarUsuario(usuario)">
      <img [src]="usuario.avatarUrl" [alt]="usuario.name" class="avatar" />
      <div class="card-body">
        <h2 class="name">{{ usuario.name }}</h2>
        <p class="username">&#64;{{ usuario.username }}</p>
        <span class="role-badge" [attr.data-role]="usuario.role">{{ usuario.role }}</span>
        <p class="location">{{ usuario.location }}</p>
      </div>
    </article>
  </div>
</div>
