<div class="container py-4">
  <header class="page-header d-flex justify-content-between align-items-end flex-wrap gap-3">
    <div>
      <h1 class="mb-1">Usuarios</h1>
      <p class="text-muted mb-0">{{ usuariosFiltrados.length }} de {{ usuarios.length }} usuarios</p>
    </div>
    <div class="search-wrapper">
      <i class="bi bi-search search-icon"></i>
      <input
        type="text"
        class="form-control search-input"
        placeholder="Buscar por nombre, usuario o ciudad..."
        [(ngModel)]="filtro" />
    </div>
  </header>

  <div class="grid" *ngIf="usuariosFiltrados.length > 0">
    <article
      class="card-usuario"
      *ngFor="let usuario of usuariosFiltrados"
      [class.selected]="usuarioSeleccionado?.id === usuario.id"
      (click)="seleccionarUsuario(usuario)">
      <img [src]="usuario.avatarUrl" [alt]="usuario.name" class="avatar" />
      <div class="card-body">
        <h2 class="name">{{ usuario.name }}</h2>
        <p class="username">&#64;{{ usuario.username }}</p>
        <span class="role-badge" [attr.data-role]="usuario.role">{{ usuario.role }}</span>
        <p class="location"><i class="bi bi-geo-alt"></i> {{ usuario.location }}</p>
      </div>
    </article>
  </div>

  <div *ngIf="usuariosFiltrados.length === 0 && filtro" class="text-center py-5 text-muted">
    <i class="bi bi-inbox fs-1 d-block mb-2"></i>
    <p class="mb-0">No se encontraron usuarios con "{{ filtro }}"</p>
  </div>

  <app-detalle-usuario
    *ngIf="usuarioSeleccionado"
    [usuario]="usuarioSeleccionado"
    (cerrar)="cerrarDetalle()">
  </app-detalle-usuario>
</div>
