<div class="container">
  <header class="page-header">
    <h1>Repositorios</h1>
    <p class="subtitle">{{ repositorios.length }} repositorios disponibles</p>
  </header>

  <div class="grid">
    <a class="card" *ngFor="let repo of repositorios" [routerLink]="['/repositorios', repo.id]">
      <div class="card-top">
        <span class="repo-id">#{{ repo.id }}</span>
        <span class="lang-badge" [attr.data-lang]="repo.language">{{ repo.language }}</span>
      </div>
      <h2 class="repo-name">{{ repo.name }}</h2>
      <p class="repo-description">{{ repo.description }}</p>
      <div class="card-footer">
        <span class="stars" title="Stars">
          <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
            <path fill="currentColor" d="M12 2l2.9 6.9L22 10l-5.5 4.8L18 22l-6-3.6L6 22l1.5-7.2L2 10l7.1-1.1z"/>
          </svg>
          {{ repo.stars }}
        </span>
        <span class="created-at">{{ repo.createdAt }}</span>
      </div>
    </a>
  </div>
</div>
