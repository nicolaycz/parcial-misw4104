<div class="container py-4" *ngIf="repositorio">
  <a routerLink="/repositorios" class="btn-volver mb-3">
    <i class="bi bi-arrow-left"></i>
    <span>Volver a repositorios</span>
  </a>

  <nav aria-label="breadcrumb">
    <ol class="breadcrumb">
      <li class="breadcrumb-item"><a routerLink="/repositorios">Repositorios</a></li>
      <li class="breadcrumb-item active" aria-current="page">{{ repositorio.name }}</li>
    </ol>
  </nav>

  <div class="card shadow-sm border-0 mb-4">
    <div class="card-body p-4">
      <div class="d-flex justify-content-between align-items-start mb-2">
        <span class="text-muted small font-monospace">#{{ repositorio.id }}</span>
        <span class="lang-badge" [attr.data-lang]="repositorio.language">{{ repositorio.language }}</span>
      </div>
      <h1 class="card-title font-monospace mb-2">{{ repositorio.name }}</h1>
      <p class="lead text-secondary mb-0">{{ repositorio.description }}</p>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-md-4">
      <div class="stat-card">
        <div class="stat-icon stat-icon--stars"><i class="bi bi-star-fill"></i></div>
        <div class="stat-content">
          <span class="stat-label">Stars</span>
          <span class="stat-value">{{ repositorio.stars }}</span>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="stat-card">
        <div class="stat-icon stat-icon--date"><i class="bi bi-calendar3"></i></div>
        <div class="stat-content">
          <span class="stat-label">Creado</span>
          <span class="stat-value font-monospace">{{ repositorio.createdAt }}</span>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="stat-card">
        <div class="stat-icon stat-icon--owner"><i class="bi bi-person"></i></div>
        <div class="stat-content">
          <span class="stat-label">Owner ID</span>
          <span class="stat-value font-monospace">{{ repositorio.ownerId }}</span>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="container py-4" *ngIf="!repositorio">
  <p class="text-muted">Cargando repositorio...</p>
</div>
